# Project-local Cargo configuration.
#
# This repository's verification gate includes `cargo llvm-cov`, which relies on
# the `__llvm_covmap` section that `-C instrument-coverage` adds to each binary.
# A non-default global linker (or an inherited `linker-flavor=ld` rustflag) can
# silently drop that section, making `cargo llvm-cov` fail with "no coverage
# data found" even though the build and tests pass.
#
# Cargo MERGES `[target.*].rustflags` across config files (global then local),
# and for repeated `-C` options the LAST value wins. So re-asserting the linker
# and a cc-driver flavor here neutralizes a global `linker-flavor=ld` /
# custom-linker setup and restores a standard, coverage-preserving link.
[target.x86_64-unknown-linux-gnu]
linker = "gcc"
rustflags = [
    "-C", "linker=gcc",
    "-C", "linker-flavor=gcc",
    "-C", "link-self-contained=no",
    "-C", "target-cpu=native",
]
